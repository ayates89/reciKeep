<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Recipe Form</title>
    
</head>
<body>

    <h1>Create New Recipe</h1>
    <form action="save-recipe.html" method="post">
        <label for="recipe-name">Recipe Name:</label>
        <input type="text" id="recipe-name" name="recipe-name" required><br><br>

        <label for="category">Category:</label>
        <textarea id="ingredients" name="ingredients" required></textarea><br><br>

        <label for="ingredients">Ingredients:</label>
        <textarea id="ingredients" name="ingredients" required></textarea><br><br>

        <label for="instructions">Instructions:</label>
        <textarea id="instructions" name="instructions" required></textarea><br><br>

        <button type="submit">Save Recipe</button>

    </form>

    <br>
    <br
            <div class="link">
                    <a href="index.html">Back to Home Page</a>
             </div>  
</body>
</html>
